<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOIN揪飲 - 建立新帳號</title>

    <link rel="stylesheet" href="../css/pages/register.css">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- Header -->
<header class="main-header">
    <div class="header-inner">

        <div class="header-logo">
            <img src="../images/logo.png" alt="JOIN 揪飲 LOGO" class="logo-img">
        </div>

        <div class="header-login">
            已有帳號？
            <a href="login.html">立即登入</a>
        </div>

    </div>
</header>



<!-- Register -->
<section class="register-section">

<div class="register-card">

<h2 class="register-title">建立新帳號</h2>

<p class="register-desc">
立即加入 JOIN 揪飲，享受專屬飲品優惠
</p>



<!-- tab -->
<div class="register-tabs">

<div class="tab active">
個人註冊
</div>

<div class="tab">
企業註冊
</div>

</div>



<form class="register-form">

<!-- phone -->

<div class="form-group">

<label>手機號碼 *</label>

<div class="input-box">

<i class="fa-solid fa-mobile-screen"></i>

<input
type="text"
placeholder="請輸入您的手機號碼"
/>

</div>

</div>



<!-- password -->

<div class="form-group">

<label>密碼 *</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="設定 8-16 位英數組合密碼"
/>

<i class="fa-regular fa-eye toggle-password"></i>

</div>

</div>



<!-- password again -->

<div class="form-group">

<label>再次輸入密碼 *</label>

<div class="input-box">

<i class="fa-solid fa-rotate-right"></i>

<input
type="password"
placeholder="請再次確認您的密碼"
/>

</div>

</div>



<!-- nickname -->

<div class="form-group">

<label>暱稱 *</label>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
placeholder="您的會員稱呼"
/>

</div>

</div>



<button class="register-btn">

註冊並驗證手機
<i class="fa-solid fa-arrow-right"></i>

</button>



<div class="agree">

<input type="checkbox">

<span>
註冊即代表您同意本站的
<a href="#">服務條款</a>
與
<a href="#">隱私政策</a>
</span>

</div>



<div class="divider">

<span>或透過以下方式註冊</span>

</div>



<div class="social-login">

<button class="social-btn">
<img src="../assets/icons/google.jpg" alt="Google">
</button>

<button class="social-btn">
<img src="../assets/icons/fb.png" alt="FB">
</button>

</div>



<div class="contact">

遇到困難嗎？
<a href="#">聯繫客服團隊</a>

</div>



</form>

</div>

</section>



<!-- Footer -->

<footer class="main-footer">

© 2024 JOIN揪飲. All rights reserved.

<div class="footer-links">

<a href="#">關於我們</a>
<a href="#">服務條款</a>
<a href="#">隱私權政策</a>
<a href="#">常見問題</a>

</div>

</footer>


</body>

</html>
