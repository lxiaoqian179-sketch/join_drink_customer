<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>會員中心 - 儲值完成</title>

  <link rel="stylesheet" href="../css/pages/index.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/footer.css">
  <link rel="stylesheet" href="../css/components/account-sidebar.css">
  <link rel="stylesheet" href="../css/pages/account-wallet-topup.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- Header -->
  <header class="main-header">
    <div class="container header-inner">

      <div class="header-logo">
        <img src="../images/logo.png" class="logo-img">
      </div>

      <div class="header-search-group">

        <div class="header-location">
          <i class="fa-solid fa-location-dot"></i>
          <span>信義路五段7號</span>
        </div>

        <div class="header-search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="搜尋想喝的飲料、店家…">
        </div>

      </div>

      <div class="header-actions">
        <i class="fa-regular fa-bell"></i>
        <i class="fa-solid fa-clock-rotate-left"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-solid fa-heart"></i>

        <button class="logout-btn">登出</button>

        <img class="avatar" src="https://i.pravatar.cc/40">
      </div>

    </div>
  </header>


  <main class="account-main">

    <div class="container account-container">

      <div class="account-layout">

        <!-- sidebar -->
        <div class="account-layout__aside">
          <aside class="account-sidebar">

            <div class="account-sidebar__header">
              <h2 class="account-sidebar__title">會員中心</h2>
              <p class="account-sidebar__subtitle">管理您的帳戶資訊</p>
            </div>

            <ul class="account-sidebar__list">

              <li class="account-sidebar__item">
                <a href="account-profile.html">
                  <i class="fa-solid fa-user"></i>
                  <span>個人資料</span>
                </a>
              </li>

              <li class="account-sidebar__item">
                <a href="account-password.html">
                  <i class="fa-solid fa-lock"></i>
                  <span>修改密碼</span>
                </a>
              </li>

              <li class="account-sidebar__item">
                <a href="account-address.html">
                  <i class="fa-solid fa-map-pin"></i>
                  <span>常用地址</span>
                </a>
              </li>

              <li class="account-sidebar__item">
                <a href="account-notification.html">
                  <i class="fa-solid fa-bell"></i>
                  <span>訊息通知</span>
                </a>
              </li>

              <li class="account-sidebar__item">
                <a href="account-favorite.html">
                  <i class="fa-solid fa-heart"></i>
                  <span>收藏店家</span>
                </a>
              </li>

              <li class="account-sidebar__item account-sidebar__item--active">
                <a href="account-wallet.html">
                  <i class="fa-solid fa-wallet"></i>
                  <span>錢包餘額</span>
                </a>
              </li>

            </ul>

          </aside>
        </div>


        <!-- main -->
        <div class="account-layout__main">

          <section class="wallet-topup-page">

            <div class="wallet-topup-confirm">
              <div class="wallet-topup-confirm__icon">
                <i class="fa-solid fa-circle-check"></i>
              </div>
              <h1 class="wallet-topup-confirm__title">儲值完成</h1>
              <p class="wallet-topup-confirm__desc">您的錢包已成功儲值。感謝您使用 JOIN 付款服務。</p>

              <div class="wallet-topup-confirm__amount">
                <span>儲值金額</span>
                <span class="amount">$500</span>
              </div>

              <a href="account-wallet.html" class="wallet-topup-confirm__button">
                回到錢包餘額
                <i class="fa-solid fa-arrow-right"></i>
              </a>
            </div>

          </section>

        </div>
      </div>
    </div>

  </main>


                <!-- Footer -->
                <footer class="main-footer">
                    <div class="footer-content">
                        <div class="footer-left">
                            <img src="../images/logo.png" alt="JOIN 探飲 LOGO" class="footer-logo">
                            <div class="footer-desc">
                                最懂你的飲品揪團平台。<br>
                                不管是辦公室下午茶，還是好友聚會，<br>
                                一鍵發起，輕鬆揪飲！
                            </div>
                        </div>
                        <div class="footer-right">
                            <div class="footer-contact-title">聯絡我們</div>
                            <div class="footer-contact-list">
                                <div class="footer-contact-item">
                                    <i class="fa-regular fa-envelope"></i>
                                    join_drink@gmail.com
                                </div>
                                <div class="footer-contact-item">
                                    <i class="fa-solid fa-phone"></i>
                                    04-1234-5678
                                </div>
                                <div class="footer-contact-item">
                                    <i class="fa-solid fa-location-dot"></i>
                                    408臺中市南屯區公益路二段51號18樓
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="footer-bottom">
                        © 2026 JOIN 揪飲 - 本平台供飲品揪團平台. All Rights Reserved.
                    </div>
                </footer>

</body>
</html>
