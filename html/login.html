<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>登入 | JOIN揪飲</title>

<link rel="stylesheet" href="../css/pages/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>


<!-- Header -->

<header class="header">

<div class="logo">
  <img src="../images/logo.png" alt="JOIN 揪飲 LOGO" class="logo-img">
</div>

<a class="header-register" href="register.html">
註冊
</a>

</header>



<!-- Login Section -->

<section class="login-section">

<div class="login-card">

<h2>歡迎回來</h2>

<p class="login-desc">
請輸入您的帳號密碼以繼續使用 JOIN 揪飲
</p>



<form class="login-form">

<!-- phone -->

<label>手機號碼</label>

<div class="input-box">

<i class="fa-solid fa-mobile-screen"></i>

<input
type="text"
placeholder="請輸入您的手機號碼"
/>

</div>



<!-- password -->

<label>密碼</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
placeholder="請輸入您的密碼"
/>

<i class="fa-regular fa-eye"></i>

</div>



<div class="forgot">

<a href="#">忘記密碼？</a>

</div>



<button class="login-btn">

登入

</button>


</form>



<div class="divider">

<span>其他登入方式</span>

</div>



<div class="social-login">

<button class="social-btn">
  <img src="../images/google.svg" alt="Google" class="social-icon">
  Google
</button>

<button class="social-btn">
  <img src="../images/facebook.svg" alt="Facebook" class="social-icon">
  Facebook
</button>

</div>



<p class="register-link">

還沒有帳號？
<a href="register.html">立即註冊</a>

</p>



</div>

</section>



<footer class="footer">

© 2024 JOIN 揪飲. All rights reserved.

</footer>


</body>
</html>
